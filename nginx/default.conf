server {
    listen 80;
    server_name nexus-changup.com;

    # 1. FastAPI (AI Engine) - /api/v1/ai 경로로 시작하는 요청
    location /api/v1/ai/ {
        proxy_pass http://nexus-fastapi:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 처리를 위해 타임아웃 대폭 연장 (5분)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # CORS 관련 설정 (필요시)
        add_header 'Access-Control-Allow-Origin' 'https://nexus-changup.com' always;
    }

    # 2. Spring Boot (Core Backend) - /api/v1 경로로 시작하는 나머지 요청
    location /api/v1/ {
        proxy_pass http://nexus-spring:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Next.js Frontend - 나머지 모든 요청
    location / {
        proxy_pass http://nexus-next:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # static assets (Spring)
    location /static/ {
        proxy_pass http://nexus-spring:8080/static/;
    }
}
