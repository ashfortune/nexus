services:
  nexus-db:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./docker-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    # - ./final.sql:/docker-entrypoint-initdb.d/99-final.sql # 필요한 경우 활성화
    restart: always
    networks:
      - nexus-network

  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: always
    networks:
      - nexus-network

  nexus-spring:
    build: ./backend-spring
    container_name: nexus-spring
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://nexus-db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_PROFILES_ACTIVE=local # 대표님 요청으로 local 유지
      - TOSS_CLIENT_KEY=${TOSS_CLIENT_KEY}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - API_DATA_PORTAL_KEY=${DATA_PORTAL_KEY}
      - API_KAKAO_KEY=${KAKAO_MAP_KEY}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=${SPRING_GOOGLE_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=${SPRING_GOOGLE_CLIENT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID=${SPRING_KAKAO_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET=${SPRING_KAKAO_CLIENT_SECRET}
      - KAKAO_PAY_CLIENT_ID=${KAKAO_PAY_CLIENT_ID}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET}
      - FASTAPI_URL=http://nexus-fastapi:7860
    depends_on:
      - nexus-db
    networks:
      - nexus-network

  nexus-fastapi:
    build: ./backend-fastapi
    container_name: nexus-fastapi
    ports:
      - "8000:7860"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@nexus-db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://nexus-redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - STABILITY_API_KEY=${STABILITY_API_KEY}
      - KIPRIS_API_KEY=${KIPRIS_API_KEY}
      - SMES_API_TOKEN=${SMES_API_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - HF_TOKEN=${HF_TOKEN}
      - HF_REPO_ID=${HF_REPO_ID}
      - KMP_DUPLICATE_LIB_OK=${KMP_DUPLICATE_LIB_OK}
      - SPRING_BOOT_URL=http://nexus-spring:8080
      - FRONTEND_URL=http://nexus-next:3000
    depends_on:
      - nexus-db
      - nexus-redis
    networks:
      - nexus-network

  nexus-next:
    build: ./frontend-next
    container_name: nexus-next
    ports:
      - "3000:3000"
    environment:
      - JAVA_SCRIPT_KEY=${JAVA_SCRIPT_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://nexus-spring:8080}
      - NEXT_PUBLIC_FASTAPI_URL=${NEXT_PUBLIC_FASTAPI_URL:-http://nexus-fastapi:7860}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    depends_on:
      - nexus-spring
      - nexus-fastapi
    networks:
      - nexus-network

  nexus-nginx:
    image: nginx:latest
    container_name: nexus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nexus-spring
      - nexus-fastapi
      - nexus-next
    networks:
      - nexus-network
    restart: always

  jenkins:
    build: ./jenkins
    container_name: nexus-jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexus-network
    restart: always

networks:
  nexus-network:
    name: nexus-network
    driver: bridge